<!DOCTYPE html>

  <link rel="stylesheet" href="style_V2.css" />

<body>

  <header class="site-header">

      <a href="#" class="logo">
        <img src="logo.png" alt="花生一生 Peanut Life">

      <nav class="desktop-nav">

        <a href="#products">產品規劃</a>

        <a href="#contact">聯絡我們</a>
        <a href="#line">加入 LINE</a>

      <button class="menu-button" id="menuButton" aria-label="開啟選單">

        <span></span>
        <span></span>

    </div>

    <div class="mobile-menu" id="mobileMenu">

            <div class="hero-actions">
              <a href="#story" class="btn btn-primary">了解品牌故事</a>
              <a href="#line" class="btn btn-secondary">加入官方 LINE</a>
            </div>
          </div>

        <div class="hero-image-wrap">
          <div class="image-card-bg"></div>
          <img src="hero.jpg" alt="雲林元長花生田" class="hero-image">
