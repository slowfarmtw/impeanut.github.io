<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>花生一生｜Brand OS 登入</title>

  <link rel="stylesheet" href="assets/css/base/variables.css" />
  <link rel="stylesheet" href="assets/css/base/reset.css" />
  <link rel="stylesheet" href="assets/css/layout/layout.css" />
  <link rel="stylesheet" href="assets/css/components/buttons.css" />
  <link rel="stylesheet" href="assets/css/components/forms.css" />
  <link rel="stylesheet" href="assets/css/components/cards.css" />
  <link rel="stylesheet" href="assets/css/pages/login.css" />
</head>

<body>
  <main class="login-page">
    <section class="login-card">
      <div class="login-brand">
        <div class="brand-symbol">🥜</div>
        <h1>花生一生</h1>
        <p>Brand OS 品牌營運系統</p>
      </div>

      <form class="login-form" id="loginForm">
        <label class="form-field">
          <span>帳號</span>
          <input
            id="loginEmail"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="請輸入 Email"
            required
          />
        </label>

        <label class="form-field">
          <span>密碼</span>
          <input
            id="loginPassword"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="請輸入密碼"
            required
          />
        </label>

        <button id="loginButton" type="submit" class="btn btn-primary">
          登入後台
        </button>
        <p id="loginMessage" class="login-message" role="alert" aria-live="polite"></p>
      </form>

      <p class="login-note">
        此系統僅供花生一生內部管理使用
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/services/supabase-config.js"></script>
  <script src="assets/js/pages/login.js"></script>
</body>
</html>
