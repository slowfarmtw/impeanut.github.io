<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>系統設定｜花生一生</title>

  <link rel="stylesheet" href="../assets/css/base/variables.css" />
  <link rel="stylesheet" href="../assets/css/base/reset.css" />
  <link rel="stylesheet" href="../assets/css/layout/layout.css" />
  <link rel="stylesheet" href="../assets/css/layout/sidebar.css" />
  <link rel="stylesheet" href="../assets/css/components/buttons.css" />
  <link rel="stylesheet" href="../assets/css/components/forms.css" />
  <link rel="stylesheet" href="../assets/css/components/cards.css" />
  <link rel="stylesheet" href="../assets/css/components/tables.css" />
  <link rel="stylesheet" href="../assets/css/components/badges.css" />
  <link rel="stylesheet" href="../assets/css/pages/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/pages/settings.css?v=20260711-2" />
</head>

<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🥜</div>
        <div>
          <h1>花生一生</h1>
          <p>品牌營運系統</p>
        </div>
      </div>

      <nav class="nav-menu">
        <a href="../index.html">🏠 儀表板</a>
        <a href="products.html">📦 商品管理</a>
        <a href="orders.html">🛒 訂單管理</a>
        <a href="customers.html">👥 顧客管理</a>
        <a href="articles.html">📝 品牌內容</a>
        <a href="analytics.html">📊 品牌分析</a>
        <a class="active" href="settings.html">⚙️ 系統設定</a>
      </nav>

      <div class="sidebar-footer">
        <button id="logoutButton" type="button" class="sidebar-logout">
          🚪 登出後台
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="page-hero">
        <div class="page-hero__content">
          <p class="page-hero__eyebrow">後台系統管理</p>
          <h1 class="page-hero__title">系統設定</h1>
          <p class="page-hero__description">集中管理品牌資料、聯絡資訊、付款、運費、營運目標與網站基本設定。</p>
        </div>

      </header>

      <form id="settingsForm" class="settings-form">
        <section class="panel settings-section">
          <div class="settings-section-header">
            <h3>品牌基本資料</h3>
            <p>後台與官網可共用的品牌名稱與聯絡資料。</p>
          </div>

          <div class="settings-grid">
            <div class="settings-field">
              <label for="brandName">品牌名稱</label>
              <input id="brandName" name="brand_name" type="text" required />
            </div>

            <div class="settings-field">
              <label for="brandNameEn">英文名稱</label>
              <input id="brandNameEn" name="brand_name_en" type="text" />
            </div>

            <div class="settings-field">
              <label for="parentBrandName">母品牌名稱</label>
              <input id="parentBrandName" name="parent_brand_name" type="text" />
            </div>

            <div class="settings-field">
              <label for="contactPhone">聯絡電話</label>
              <input id="contactPhone" name="contact_phone" type="tel" />
            </div>

            <div class="settings-field">
              <label for="contactEmail">聯絡 Email</label>
              <input id="contactEmail" name="contact_email" type="email" />
            </div>

            <div class="settings-field">
              <label for="contactAddress">聯絡地址</label>
              <input id="contactAddress" name="contact_address" type="text" />
            </div>
          </div>
        </section>

        <section class="panel settings-section">
          <div class="settings-section-header">
            <h3>社群連結</h3>
            <p>請填入完整網址，之後可提供官網與後台共用。</p>
          </div>

          <div class="settings-grid">
            <div class="settings-field">
              <label for="lineUrl">LINE 連結</label>
              <input id="lineUrl" name="line_url" type="url" placeholder="https://..." />
            </div>

            <div class="settings-field">
              <label for="instagramUrl">Instagram 連結</label>
              <input id="instagramUrl" name="instagram_url" type="url" placeholder="https://..." />
            </div>

            <div class="settings-field full">
              <label for="facebookUrl">Facebook 連結</label>
              <input id="facebookUrl" name="facebook_url" type="url" placeholder="https://..." />
            </div>
          </div>
        </section>

        <section class="panel settings-section">
          <div class="settings-section-header">
            <h3>付款與配送</h3>
            <p>管理顧客付款說明、運費與免運門檻。</p>
          </div>

          <div class="settings-grid">
            <div class="settings-field full">
              <label for="bankTransferInfo">銀行匯款說明</label>
              <textarea id="bankTransferInfo" name="bank_transfer_info"></textarea>
            </div>

            <div class="settings-field full">
              <label for="linePayInfo">LINE Pay 說明</label>
              <textarea id="linePayInfo" name="line_pay_info"></textarea>
            </div>

            <div class="settings-field">
              <label for="defaultShippingFee">宅配運費</label>
              <input id="defaultShippingFee" name="default_shipping_fee" type="number" min="0" step="1" required />
            </div>

            <div class="settings-field">
              <label for="convenienceStoreShippingFee">超商運費</label>
              <input id="convenienceStoreShippingFee" name="convenience_store_shipping_fee" type="number" min="0" step="1" required />
            </div>

            <div class="settings-field">
              <label for="freeShippingThreshold">免運門檻</label>
              <input id="freeShippingThreshold" name="free_shipping_threshold" type="number" min="0" step="1" required />
            </div>

            <div class="settings-field">
              <label for="orderNumberPrefix">訂單編號前綴</label>
              <input id="orderNumberPrefix" name="order_number_prefix" type="text" maxlength="10" required />
            </div>
          </div>
        </section>

        <section class="panel settings-section">
          <div class="settings-section-header">
            <h3>營運目標</h3>
            <p>儀表板與品牌分析將使用這些數字計算達成率。</p>
          </div>

          <div class="settings-grid">
            <div class="settings-field">
              <label for="lowStockThreshold">低庫存警戒值</label>
              <input id="lowStockThreshold" name="low_stock_threshold" type="number" min="0" step="1" required />
            </div>

            <div class="settings-field">
              <label for="monthlyRevenueTarget">每月營業目標</label>
              <input id="monthlyRevenueTarget" name="monthly_revenue_target" type="number" min="0" step="1" required />
            </div>

            <div class="settings-field">
              <label for="annualRevenueTarget">年度營業目標</label>
              <input id="annualRevenueTarget" name="annual_revenue_target" type="number" min="0" step="1" required />
            </div>
          </div>
        </section>

        <section class="panel settings-section">
          <div class="settings-section-header">
            <h3>網站與數據</h3>
            <p>管理預設 SEO、網站公告、維護模式與 GA4 識別碼。</p>
          </div>

          <div class="settings-grid">
            <div class="settings-field full">
              <label for="defaultSeoDescription">預設 SEO 描述</label>
              <textarea id="defaultSeoDescription" name="default_seo_description"></textarea>
            </div>

            <div class="settings-field full">
              <label for="websiteNotice">網站公告</label>
              <textarea id="websiteNotice" name="website_notice"></textarea>
            </div>

            <div class="settings-field full">
              <label>首頁最新消息跑馬燈</label>
              <div class="maintenance-row">
                <input id="marqueeEnabled" name="marquee_enabled" type="checkbox" />
                <label for="marqueeEnabled">在首頁顯示跑馬燈</label>
              </div>
            </div>

            <div class="settings-field full">
              <label for="marqueeText">跑馬燈文字</label>
              <input id="marqueeText" name="marquee_text" type="text" maxlength="180" placeholder="例如：新鮮烘焙花生開放預訂，滿額免運。" />
            </div>

            <div class="settings-field full">
              <label for="marqueeUrl">點擊連結</label>
              <input id="marqueeUrl" name="marquee_url" type="text" maxlength="500" placeholder="products.html 或 https://...；不需要連結可留空" />
            </div>

            <div class="settings-field full">
              <label>連結開啟方式</label>
              <div class="maintenance-row">
                <input id="marqueeNewTab" name="marquee_new_tab" type="checkbox" />
                <label for="marqueeNewTab">在新分頁開啟</label>
              </div>
            </div>

            <div class="settings-field">
              <label for="ga4MeasurementId">GA4 追蹤識別碼</label>
              <input id="ga4MeasurementId" name="ga4_measurement_id" type="text" placeholder="G-XXXXXXXXXX" />
            </div>

            <div class="settings-field">
              <label>維護模式</label>
              <div class="maintenance-row">
                <input id="maintenanceMode" name="maintenance_mode" type="checkbox" />
                <label for="maintenanceMode">啟用網站維護模式</label>
              </div>
            </div>
          </div>
        </section>

        <div class="settings-actions">
          <p id="settingsMessage" class="settings-message" role="status" aria-live="polite">正在讀取設定…</p>
          <button id="saveSettingsButton" type="submit" class="btn primary">儲存系統設定</button>
        </div>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/services/supabase-config.js"></script>
  <script src="../assets/js/services/auth-guard.js"></script>
  <script src="../assets/js/layout/sidebar.js?v=20260712"></script>
  <script>
    document.getElementById("logoutButton")?.addEventListener("click", async () => {
      const button = document.getElementById("logoutButton");

      button.disabled = true;
      button.textContent = "登出中…";

      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        console.error("登出失敗：", error);
        button.disabled = false;
        button.textContent = "🚪 登出後台";
        alert("登出失敗，請稍後再試。");
        return;
      }

      window.location.replace("../login.html");
    });
  </script>
  <script src="../assets/js/pages/settings.js?v=20260713-marquee"></script>
</body>
</html>
