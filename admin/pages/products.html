<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>商品管理｜花生一生後台</title>

  <!-- Base -->
  <link rel="stylesheet" href="../assets/css/base/reset.css" />
  <link rel="stylesheet" href="../assets/css/base/variables.css" />

  <!-- Layout -->
  <link rel="stylesheet" href="../assets/css/layout/layout.css" />
  <link rel="stylesheet" href="../assets/css/layout/sidebar.css" />
  <link rel="stylesheet" href="../assets/css/layout/header.css" />

  <!-- Components -->
  <link rel="stylesheet" href="../assets/css/components/buttons.css" />
  <link rel="stylesheet" href="../assets/css/components/cards.css" />
  <link rel="stylesheet" href="../assets/css/components/tables.css" />
  <link rel="stylesheet" href="../assets/css/components/badges.css" />

  <!-- Page -->
  <link rel="stylesheet" href="../assets/css/pages/products.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="adminSidebar">
      <div class="brand">
        <div class="brand-icon">🥜</div>
        <div>
          <h1>花生一生</h1>
          <p>Brand OS</p>
        </div>
      </div>

      <nav class="nav-menu">
        <a href="../index.html">🏠 Dashboard</a>
        <a href="products.html" class="active">📦 商品管理</a>
        <a href="orders.html">🛒 訂單管理</a>
        <a href="customers.html">👥 顧客管理</a>
        <a href="articles.html">📝 品牌內容</a>
        <a href="analytics.html">📊 品牌分析</a>
        <a href="settings.html">⚙️ 系統設定</a>
      </nav>

      <button id="logoutButton" type="button" class="sidebar-logout">
        🚪 登出後台
      </button>
    </aside>

    <!-- Main -->
    <main class="main products-main">

      <!-- Header -->
      <section class="products-hero">
        <div>
          <p class="eyebrow">PRODUCTS</p>
          <h2>商品管理</h2>
          <p class="hero-copy">
            管理商品上架、價格、庫存與前台顯示狀態。這裡會連接 Supabase 的 products 商品資料表。
          </p>

          <div class="quick-actions">
            <button type="button" class="quick-action" id="refreshProductsBtn">
              重新整理
            </button>

            <a class="quick-action" href="product-editor.html">
              ＋ 新增商品
            </a>
          </div>
        </div>
      </section>

      <!-- KPI -->
      <section class="products-kpi-grid">
        <article class="kpi-card">
          <span>📦 商品總數</span>
          <strong id="totalProducts">0</strong>
          <p>目前 Brand OS 商品資料</p>
        </article>

        <article class="kpi-card">
          <span>🟢 已上架</span>
          <strong id="activeProducts">0</strong>
          <p>正在官網銷售中的商品</p>
        </article>

        <article class="kpi-card">
          <span>⚠️ 低庫存</span>
          <strong id="lowStockProducts">0</strong>
          <p>庫存低於安全庫存的商品</p>
        </article>
      </section>

      <!-- Product Table -->
      <section class="dashboard-panel products-panel">
        <div class="panel-header">
          <div>
            <h3>商品列表</h3>
            <p id="productStatusText">讀取中...</p>
          </div>
          <span>Products</span>
        </div>

        <div class="admin-table-wrap">
          <table class="admin-table products-table">
            <thead>
              <tr>
                <th>圖片</th>
                <th>SKU</th>
                <th>商品名稱</th>
                <th>分類</th>
                <th>規格</th>
                <th>售價</th>
                <th>庫存</th>
                <th>安全庫存</th>
                <th>狀態</th>
                <th>前台 / 操作</th>
              </tr>
            </thead>

            <tbody id="productsTableBody">
              <tr>
                <td colspan="10">商品讀取中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <!-- Services -->
  <script src="../assets/js/services/supabase-config.js"></script>
  <script src="../assets/js/services/auth-guard.js"></script>
  <script>
    document.getElementById("logoutButton")?.addEventListener("click", async () => {
      const button = document.getElementById("logoutButton");

      button.disabled = true;
      button.textContent = "登出中…";

      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        console.error("登出失敗：", error);
        button.disabled = false;
        button.textContent = "🚪 登出後台";
        alert("登出失敗，請稍後再試。");
        return;
      }

      window.location.replace("../login.html");
    });
  </script>

  <!-- Page -->
  <script src="../assets/js/pages/products.js"></script>
</body>
</html>
