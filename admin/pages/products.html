<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>商品管理｜花生一生 Brand OS</title>

  <link rel="stylesheet" href="../assets/css/base/variables.css" />
  <link rel="stylesheet" href="../assets/css/base/reset.css" />
  <link rel="stylesheet" href="../assets/css/pages/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/pages/products.css" />
</head>

<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🥜</div>
        <div>
          <h1>花生一生</h1>
          <p>Brand OS</p>
        </div>
      </div>

      <nav class="nav-menu">
        <a href="../index.html">🏠 Dashboard</a>
        <a class="active" href="products.html">📦 商品管理</a>
        <a href="orders.html">🛒 訂單管理</a>
        <a href="customers.html">👥 顧客管理</a>
        <a href="articles.html">📝 品牌內容</a>
        <a href="analytics.html">📊 品牌分析</a>
        <a href="settings.html">⚙️ 系統設定</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2>商品管理</h2>
          <p>管理商品、價格、庫存與上下架狀態</p>
        </div>

        <button id="openProductModal" class="product-add-btn">
          ＋ 新增商品
        </button>
      </header>

      <section class="products-toolbar">
        <input id="productSearch" type="text" placeholder="搜尋商品名稱、分類或狀態..." />

        <select id="statusFilter">
          <option value="all">全部狀態</option>
          <option value="上架">上架</option>
          <option value="草稿">草稿</option>
          <option value="停售">停售</option>
        </select>
      </section>

      <section class="products-table-card">
        <table class="products-table">
          <thead>
            <tr>
              <th>商品</th>
              <th>分類</th>
              <th>售價</th>
              <th>庫存</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="productTableBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="productModal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3 id="productModalTitle">新增商品</h3>
          <p>商品會先儲存在目前瀏覽器，之後再串接 Supabase。</p>
        </div>
        <button id="closeProductModal" class="modal-close" type="button">×</button>
      </div>

      <form id="productForm" class="product-form">
        <label>
          商品名稱
          <input id="productName" type="text" required placeholder="例如：原味烘焙花生" />
        </label>

        <label>
          商品副標題
          <input id="productDesc" type="text" placeholder="例如：80g｜日常泡茶零食" />
        </label>

        <div class="form-row">
          <label>
            分類
            <input id="productCategory" type="text" required placeholder="例如：烘焙花生" />
          </label>

          <label>
            狀態
            <select id="productStatus">
              <option value="上架">上架</option>
              <option value="草稿">草稿</option>
              <option value="停售">停售</option>
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>
            售價
            <input id="productPrice" type="number" min="0" required placeholder="100" />
          </label>

          <label>
            庫存
            <input id="productStock" type="number" min="0" required placeholder="50" />
          </label>
        </div>

        <div class="modal-actions">
          <button id="cancelProductModal" type="button" class="btn-secondary">取消</button>
          <button type="submit" class="btn-primary">儲存商品</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/pages/products.js"></script>
</body>
</html>
