<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新增／編輯品牌內容｜花生一生</title>

  <link rel="stylesheet" href="../assets/css/base/variables.css" />
  <link rel="stylesheet" href="../assets/css/base/reset.css" />
  <link rel="stylesheet" href="../assets/css/layout/layout.css" />
  <link rel="stylesheet" href="../assets/css/layout/sidebar.css" />
  <link rel="stylesheet" href="../assets/css/components/buttons.css" />
  <link rel="stylesheet" href="../assets/css/components/forms.css" />
  <link rel="stylesheet" href="../assets/css/components/cards.css" />
  <link rel="stylesheet" href="../assets/css/components/tables.css" />
  <link rel="stylesheet" href="../assets/css/components/badges.css" />
  <link rel="stylesheet" href="../assets/css/pages/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/pages/article-editor.css?v=20260715-5" />
</head>
<body>
  <div class="admin-shell admin-layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🥜</div>
        <div>
          <h1>花生一生</h1>
          <p>品牌營運系統</p>
        </div>
      </div>

      <nav class="nav-menu" aria-label="後台導覽">
        <a href="../index.html">🏠 儀表板</a>
        <a href="products.html">📦 商品管理</a>
        <a href="orders.html">🛒 訂單管理</a>
        <a href="customers.html">👥 顧客管理</a>
        <a href="articles.html" class="active">📝 品牌內容</a>
        <a href="analytics.html">📊 品牌分析</a>
        <a href="settings.html">⚙️ 系統設定</a>
      </nav>

      <div class="sidebar-footer">
        <button id="logoutButton" type="button" class="sidebar-logout">
          🚪 登出後台
        </button>
      </div>
    </aside>

    <main class="admin-main main">
      <header class="page-hero">
        <div class="page-hero__content">
          <p class="page-hero__eyebrow">品牌內容管理</p>
          <h1 id="editorPageTitle" class="page-hero__title">新增品牌內容</h1>
          <p class="page-hero__description">管理搜尋文章、花生研究室、最新消息、品牌故事與檢驗報告。</p>
        </div>

      </header>

      <form id="articleEditorForm" class="editor-layout">
        <!-- 主要文章內容 -->
        <section class="panel editor-main-panel">
          <div class="panel-header">
            <div>
              <h3>文章內容</h3>
              <p id="articleEditorStatus">請填寫文章內容與 SEO 設定。</p>
            </div>
            <div class="content-actions">
              <a class="btn secondary" href="articles.html">返回列表</a>
              <a class="btn secondary" id="staticArticlePreview" href="#" target="_blank" rel="noopener" hidden>查看靜態頁</a>
              <button type="submit" class="btn primary" form="articleEditorForm">儲存內容</button>
            </div>
          </div>

          <div class="form-grid one-column">
            <label class="form-field">
              <span>文章標題</span>
              <input type="text" id="articleTitle" required maxlength="120" placeholder="例如：花生怎麼保存才不容易油耗？" />
              <small>文章主標題，未來會成為頁面 H1。</small>
            </label>

            <label class="form-field">
              <span>網址代稱</span>
              <input type="text" id="articleSlug" required inputmode="url" placeholder="例如：peanut-storage" />
              <small>建議用英文小寫、數字與 -。未來 SEO 靜態頁會產生為 /articles/peanut-storage.html。</small>
            </label>

            <label class="form-field">
              <span>文章摘要</span>
              <textarea id="articleExcerpt" rows="3" maxlength="240" placeholder="用 1～2 句話說明這篇文章重點。"></textarea>
              <small>列表頁與 SEO 描述可共用，建議簡短清楚。</small>
            </label>

            <div class="form-field rich-editor-field">
              <span>文章內文</span>
              <div class="rich-editor-toolbar" id="articleEditorToolbar" role="toolbar" aria-label="文章文字格式">
                <select id="articleBlockFormat" aria-label="段落格式" title="段落格式">
                  <option value="p">正文</option>
                  <option value="h2">大標題 H2</option>
                  <option value="h3">小標題 H3</option>
                  <option value="blockquote">引用文字</option>
                </select>

                <span class="toolbar-label">字級</span>
                <div class="editor-size-options" aria-label="文字大小">
                  <button type="button" data-font-size="2" title="小字 14px">小 14</button>
                  <button type="button" data-font-size="3" title="標準 16px">標準 16</button>
                  <button type="button" data-font-size="4" title="中大 18px">中 18</button>
                  <button type="button" data-font-size="5" title="大字 24px">大 24</button>
                  <button type="button" data-font-size="6" title="特大 30px">特大 30</button>
                </div>

                <span class="toolbar-divider" aria-hidden="true"></span>
                <span class="toolbar-label">文字顏色</span>
                <div class="editor-color-options" aria-label="文字顏色">
                  <button type="button" class="color-swatch" data-text-color="#111111" style="--swatch-color:#111111" title="黑色" aria-label="黑色"></button>
                  <button type="button" class="color-swatch" data-text-color="#757575" style="--swatch-color:#757575" title="灰色" aria-label="灰色"></button>
                  <button type="button" class="color-swatch" data-text-color="#e53935" style="--swatch-color:#e53935" title="紅色" aria-label="紅色"></button>
                  <button type="button" class="color-swatch" data-text-color="#fb8c00" style="--swatch-color:#fb8c00" title="橘色" aria-label="橘色"></button>
                  <button type="button" class="color-swatch" data-text-color="#fdd835" style="--swatch-color:#fdd835" title="黃色" aria-label="黃色"></button>
                  <button type="button" class="color-swatch" data-text-color="#43a047" style="--swatch-color:#43a047" title="綠色" aria-label="綠色"></button>
                  <button type="button" class="color-swatch" data-text-color="#00acc1" style="--swatch-color:#00acc1" title="青色" aria-label="青色"></button>
                  <button type="button" class="color-swatch" data-text-color="#1e88e5" style="--swatch-color:#1e88e5" title="藍色" aria-label="藍色"></button>
                  <button type="button" class="color-swatch" data-text-color="#8e24aa" style="--swatch-color:#8e24aa" title="紫色" aria-label="紫色"></button>
                  <button type="button" class="color-swatch" data-text-color="#d81b60" style="--swatch-color:#d81b60" title="桃紅色" aria-label="桃紅色"></button>
                  <label class="custom-color-control" title="自訂文字顏色">
                    <input type="color" id="articleTextColor" value="#5c4634" aria-label="自訂文字顏色" />
                    <span>自訂</span>
                  </label>
                </div>

                <span class="toolbar-label">文字底色</span>
                <div class="editor-color-options" aria-label="文字底色">
                  <button type="button" class="color-swatch is-highlight" data-highlight-color="#f3e5c8" style="--swatch-color:#f3e5c8" title="米黃色底" aria-label="米黃色底"></button>
                  <button type="button" class="color-swatch is-highlight" data-highlight-color="#e5eadb" style="--swatch-color:#e5eadb" title="灰綠色底" aria-label="灰綠色底"></button>
                  <button type="button" class="color-swatch is-highlight" data-highlight-color="#eadbd7" style="--swatch-color:#eadbd7" title="淡粉色底" aria-label="淡粉色底"></button>
                  <button type="button" class="color-swatch is-highlight" data-highlight-color="transparent" style="--swatch-color:#ffffff" title="清除文字底色" aria-label="清除文字底色">×</button>
                </div>

                <span class="toolbar-divider" aria-hidden="true"></span>
                <button type="button" data-command="undo" title="復原" aria-label="復原">↶</button>
                <button type="button" data-command="redo" title="重做" aria-label="重做">↷</button>
                <button type="button" data-command="bold" title="粗體" aria-label="粗體"><strong>B</strong></button>
                <button type="button" data-command="italic" title="斜體" aria-label="斜體"><em>I</em></button>
                <button type="button" data-command="underline" title="底線" aria-label="底線"><u>U</u></button>
                <button type="button" data-command="strikeThrough" title="刪除線" aria-label="刪除線"><s>S</s></button>
                <button type="button" data-command="insertUnorderedList" title="項目符號" aria-label="項目符號">• 清單</button>
                <button type="button" data-command="insertOrderedList" title="編號清單" aria-label="編號清單">1. 清單</button>
                <button type="button" data-command="justifyLeft" title="靠左對齊" aria-label="靠左對齊">靠左</button>
                <button type="button" data-command="justifyCenter" title="置中對齊" aria-label="置中對齊">置中</button>
                <button type="button" data-command="justifyRight" title="靠右對齊" aria-label="靠右對齊">靠右</button>
                <button type="button" data-command="justifyFull" title="左右對齊" aria-label="左右對齊">左右對齊</button>
                <button type="button" id="articleImageButton" class="toolbar-feature-button" title="上傳並插入圖片" aria-label="上傳並插入圖片">＋ 圖片</button>
                <button type="button" id="articleLinkButton" title="加入連結" aria-label="加入連結">加入連結</button>
                <button type="button" data-command="unlink" title="移除連結" aria-label="移除連結">移除連結</button>
                <button type="button" data-command="removeFormat" title="清除文字格式" aria-label="清除文字格式">清除格式</button>
              </div>

              <div
                id="articleContent"
                class="rich-editor-content"
                contenteditable="true"
                role="textbox"
                aria-multiline="true"
                data-placeholder="從這裡開始輸入文章內文……"
              ></div>
              <small>先選取文字，再設定大小、顏色或粗體。文章標題請使用 H2／H3，有助於閱讀結構與 SEO；不要只靠放大文字代替標題。</small>

              <div id="articleImageDialog" class="article-image-dialog" hidden>
                <div class="article-image-dialog__backdrop" data-close-image-dialog></div>
                <section class="article-image-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="articleImageDialogTitle">
                  <div class="article-image-dialog__header">
                    <div>
                      <p class="section-label">文章圖片</p>
                      <h3 id="articleImageDialogTitle">上傳並插入圖片</h3>
                    </div>
                    <button type="button" class="image-dialog-close" data-close-image-dialog aria-label="關閉圖片視窗">×</button>
                  </div>

                  <div class="article-image-dialog__grid">
                    <div>
                      <label class="image-upload-dropzone" for="articleImageFile">
                        <input type="file" id="articleImageFile" accept="image/jpeg,image/png,image/webp,image/avif" />
                        <strong>選擇圖片</strong>
                        <span>支援 JPG、PNG、WebP、AVIF，單張上限 5MB</span>
                      </label>
                      <div id="articleImagePreview" class="article-image-preview"><span>圖片預覽</span></div>
                    </div>

                    <div class="image-dialog-fields">
                      <label class="form-field">
                        <span>圖片替代文字（alt）</span>
                        <input type="text" id="articleImageAlt" maxlength="160" placeholder="例如：花生放入密封罐保存" />
                        <small>請描述圖片實際內容，供搜尋引擎與視障讀者理解。</small>
                      </label>

                      <label class="form-field">
                        <span>圖片說明</span>
                        <input type="text" id="articleImageCaption" maxlength="200" placeholder="選填，會顯示在圖片下方" />
                      </label>

                      <label class="form-field">
                        <span>顯示尺寸</span>
                        <select id="articleImageSize">
                          <option value="medium">中圖（建議，約 460px）</option>
                          <option value="large">大圖（約 620px）</option>
                          <option value="full">內容欄寬（最大 820px）</option>
                        </select>
                      </label>

                      <label class="form-field">
                        <span>圖片對齊</span>
                        <select id="articleImageAlign">
                          <option value="center">置中</option>
                          <option value="left">靠左</option>
                          <option value="right">靠右</option>
                        </select>
                      </label>
                    </div>
                  </div>

                  <p id="articleImageStatus" class="article-image-status">請先選擇圖片。</p>
                  <div class="article-image-dialog__actions">
                    <button type="button" class="btn secondary" data-close-image-dialog>取消</button>
                    <button type="button" class="btn primary" id="articleImageUploadButton">上傳並插入</button>
                  </div>
                </section>
              </div>
            </div>
          </div>
        </section>

        <!-- 右側設定區 -->
        <aside class="editor-side-panel">
          <section class="panel">
            <h3>分類與發布</h3>

            <div class="form-grid one-column">
              <label class="form-field">
                <span>分類</span>
                <select id="articleCategoryId">
                  <option value="">讀取分類中...</option>
                </select>
                <small>分類可在「品牌內容 → 管理分類」新增主分類與子分類。</small>
              </label>

              <label class="form-field">
                <span>內容類型</span>
                <select id="articleContentType">
                  <option value="general">一般文章</option>
                  <option value="seo_article">SEO 文章</option>
                  <option value="research">花生研究室</option>
                  <option value="news">最新消息</option>
                  <option value="brand">品牌故事</option>
                  <option value="report">檢驗報告</option>
                  <option value="faq">常見問題</option>
                </select>
                <small>系統用分類，選擇後會自動同步上方的「分類」。</small>
              </label>

              <label class="form-field">
                <span>發布狀態</span>
                <select id="articleStatus">
                  <option value="draft">草稿</option>
                  <option value="published">已發布</option>
                  <option value="archived">封存</option>
                </select>
              </label>

              <label class="form-field checkbox-field">
                <input type="checkbox" id="articleIsFeatured" />
                <span>設為主打內容</span>
              </label>

              <label class="form-field">
                <span>發布時間</span>
                <input type="datetime-local" id="articlePublishedAt" />
                <small>若狀態選擇已發布但時間空白，系統會自動使用儲存當下時間。</small>
              </label>
            </div>
          </section>

          <section class="panel">
            <h3>封面圖片</h3>

            <div class="form-grid one-column">
              <label class="form-field">
                <span>封面圖片</span>
                <input type="text" id="articleCoverImage" inputmode="url" placeholder="可填完整圖片網址、images/xxx.webp 或先空白" />
                <small>可填完整網址，或填 images/articles/檔名.webp。若空白，前台會用預設圖片。</small>
              </label>

              <div class="cover-preview" id="articleCoverPreview">
                <span>尚未設定封面圖片</span>
              </div>
            </div>
          </section>

          <section class="panel">
            <h3>SEO 設定</h3>

            <div class="form-grid one-column">
              <label class="form-field">
                <span>SEO 標題</span>
                <input type="text" id="articleSeoTitle" maxlength="80" placeholder="例如：花生保存方法｜如何避免油耗與風味變差" />
                <small>搜尋結果標題使用。若空白，系統會自動使用文章標題。</small>
              </label>

              <label class="form-field">
                <span>SEO 描述</span>
                <textarea id="articleSeoDescription" rows="4" maxlength="180" placeholder="建議 60～90 個中文字，說明搜尋結果摘要。"></textarea>
                <small>搜尋結果摘要使用。若空白，系統會自動使用文章摘要。</small>
              </label>

              <label class="form-field">
                <span>SEO 關鍵字</span>
                <input type="text" id="articleSeoKeywords" placeholder="花生保存, 花生油耗, 雲林花生" />
              </label>

              <label class="form-field">
                <span>正式網址</span>
                <input type="text" id="articleCanonicalUrl" inputmode="url" placeholder="例如：https://impeanut.com/articles/peanut-storage.html" />
                <small>未來靜態化文章時，這會是 Google 判斷的正式網址。</small>
              </label>

              <label class="form-field">
                <span>搜尋引擎設定</span>
                <select id="articleMetaRobots">
                  <option value="index,follow">允許收錄與追蹤連結</option>
                  <option value="noindex,nofollow">不收錄也不追蹤連結</option>
                  <option value="noindex,follow">不收錄但允許追蹤連結</option>
                </select>
              </label>
            </div>
          </section>
        </aside>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/services/supabase-config.js?v=20260709"></script>
  <script src="../assets/js/services/auth-guard.js"></script>
  <script src="../assets/js/layout/sidebar.js?v=20260712"></script>
  <script>
    document.getElementById("logoutButton")?.addEventListener("click", async () => {
      const button = document.getElementById("logoutButton");

      button.disabled = true;
      button.textContent = "登出中…";

      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        console.error("登出失敗：", error);
        button.disabled = false;
        button.textContent = "🚪 登出後台";
        alert("登出失敗，請稍後再試。");
        return;
      }

      window.location.replace("../login.html");
    });
  </script>
  <script src="../assets/js/pages/article-editor.js?v=20260715-5"></script>
</body>
</html>
