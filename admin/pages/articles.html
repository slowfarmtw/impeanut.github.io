<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>品牌內容｜花生一生</title>

  <link rel="stylesheet" href="../assets/css/base/variables.css" />
  <link rel="stylesheet" href="../assets/css/base/reset.css" />
  <link rel="stylesheet" href="../assets/css/layout/layout.css" />
  <link rel="stylesheet" href="../assets/css/layout/sidebar.css" />
  <link rel="stylesheet" href="../assets/css/components/buttons.css" />
  <link rel="stylesheet" href="../assets/css/components/forms.css" />
  <link rel="stylesheet" href="../assets/css/components/cards.css" />
  <link rel="stylesheet" href="../assets/css/components/tables.css" />
  <link rel="stylesheet" href="../assets/css/components/badges.css" />
  <link rel="stylesheet" href="../assets/css/pages/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/pages/articles.css?v=20260715-4" />
</head>

<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🥜</div>
        <div>
          <h1>花生一生</h1>
          <p>品牌營運系統</p>
        </div>
      </div>

      <nav class="nav-menu">
        <a href="../index.html">🏠 儀表板</a>
        <a href="products.html">📦 商品管理</a>
        <a href="orders.html">🛒 訂單管理</a>
        <a href="customers.html">👥 顧客管理</a>
        <a class="active" href="articles.html">📝 品牌內容</a>
        <a href="analytics.html">📊 品牌分析</a>
        <a href="settings.html">⚙️ 系統設定</a>
      </nav>

      <div class="sidebar-footer">
        <button id="logoutButton" type="button" class="sidebar-logout">
          🚪 登出後台
        </button>
      </div>
    </aside>

    <main class="main articles-main">
      <header class="page-hero">
        <div class="page-hero__content">
          <p class="page-hero__eyebrow">品牌內容管理</p>
          <h1 class="page-hero__title">品牌內容</h1>
          <p class="page-hero__description">管理文章、搜尋內容、最新消息與品牌資料。</p>
        </div>

      </header>

      <section class="kpi-grid articles-stats" aria-label="品牌內容統計">
        <article class="stat-card kpi-card">
          <span>內容總數</span>
          <strong id="totalArticlesCount">0</strong>
          <small>所有品牌內容</small>
        </article>

        <article class="stat-card kpi-card">
          <span>已發布</span>
          <strong id="publishedArticlesCount">0</strong>
          <small>前台可見內容</small>
        </article>

        <article class="stat-card kpi-card">
          <span>草稿</span>
          <strong id="draftArticlesCount">0</strong>
          <small>尚未公開內容</small>
        </article>

        <article class="stat-card kpi-card">
          <span>SEO 文章</span>
          <strong id="seoArticlesCount">0</strong>
          <small>自然搜尋內容</small>
        </article>
      </section>

      <section class="panel articles-panel">
        <div class="panel-header articles-panel-header">
          <div class="articles-panel-title">
            <h3>品牌內容列表</h3>
            <p id="articlesStatusText">讀取中...</p>
          </div>

          <div class="articles-toolbar">
            <div class="articles-filters">
              <select id="articleCategoryFilter" aria-label="分類篩選">
                <option value="all">全部分類</option>
              </select>

              <select id="articleTypeFilter" aria-label="類型篩選">
                <option value="all">全部類型</option>
                <option value="seo_article">SEO 文章</option>
                <option value="research">花生研究室</option>
                <option value="news">最新消息</option>
                <option value="brand">品牌故事</option>
                <option value="report">檢驗報告</option>
                <option value="faq">常見問題</option>
                <option value="general">一般文章</option>
              </select>

              <select id="articleStatusFilter" aria-label="狀態篩選">
                <option value="all">全部狀態</option>
                <option value="published">已發布</option>
                <option value="draft">草稿</option>
                <option value="archived">封存</option>
              </select>
            </div>

            <div class="articles-actions">
              <button type="button" class="btn secondary" id="refreshArticlesBtn">重新整理</button>
              <a class="btn secondary" href="article-categories.html">管理分類</a>
              <a class="btn primary" href="article-editor.html">＋ 新增內容</a>
            </div>
          </div>
        </div>

        <div class="table-wrap">
          <table class="data-table responsive-table">
            <thead>
              <tr>
                <th>文章</th>
                <th>分類</th>
                <th>類型</th>
                <th>狀態</th>
                <th>主打</th>
                <th>發布時間</th>
                <th>更新時間</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="articlesTableBody">
              <tr>
                <td colspan="8">品牌內容讀取中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/services/supabase-config.js?v=20260709"></script>
  <script src="../assets/js/services/auth-guard.js"></script>
  <script src="../assets/js/layout/sidebar.js?v=20260712"></script>
  <script>
    document.getElementById("logoutButton")?.addEventListener("click", async () => {
      const button = document.getElementById("logoutButton");

      button.disabled = true;
      button.textContent = "登出中…";

      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        console.error("登出失敗：", error);
        button.disabled = false;
        button.textContent = "🚪 登出後台";
        alert("登出失敗，請稍後再試。");
        return;
      }

      window.location.replace("../login.html");
    });
  </script>
  <script src="../assets/js/pages/articles.js?v=20260715-2"></script>
</body>
</html>
