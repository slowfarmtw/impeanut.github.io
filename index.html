<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>花生一生</title>
  <style>
    body {
      font-family: "Noto Sans TC", sans-serif;
      background-color: #f5f1e9;
      text-align: center;
      padding: 50px;
      color: #5a3e2b;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #c69c6d;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>花生一生</h1>
    <p>從從農農，用一生種好一顆花生。</p>

    <p>
      我們來自台灣的田間，<br>
      用最單純的方式，種出最安心的花生。
    </p>

    <a class="btn" href="#">即將開賣</a>
  </div>

</body>
</html>
